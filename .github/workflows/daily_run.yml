name: NSE AI Trader

on:
  # ── Triggering: two-layer, PUNCTUAL primary + safety-net backup ──────────────
  # Priority: NEVER MISS a session. A few extra runs are fine — the per-session
  # dedup guard turns any redundant fire into a harmless dashboard-only no-op — but
  # a missed session is not acceptable. So we run BOTH layers and tolerate overlap.
  #
  # PRIMARY: cron-job.org (external pinger) -> repository_dispatch with the EXACT
  #   session in client_payload, at the 5 session times. GitHub's OWN cron is known
  #   to run late or skip under load, so an external pinger is the punctual source.
  #   Keep it at 5 FIXED times (NOT an interval like "every 15 min").
  # BACKUP: GitHub schedule: below, fired ~20-25 MIN AFTER each primary. It exists
  #   only to catch a session the primary missed:
  #     - primary already ran it  -> dedup makes the backup a no-op (no duplicate)
  #     - primary missed/late      -> the backup runs the session for real
  #   GitHub cron drift only helps here (a late backup is still a valid catch-up).
  #   Window-based session detection below maps a drifted backup to the right one.
  schedule:
    - cron: "30 3 * * 1-5"   # ~09:00 IST — backup for pre-open  (primary 08:35)
    - cron: "30 4 * * 1-5"   # ~10:00 IST — backup for morning   (primary 09:35)
    - cron: "10 7 * * 1-5"   # ~12:40 IST — backup for midday    (primary 11:45)
    - cron: "40 8 * * 1-5"   # ~14:10 IST — backup for afternoon (primary 13:15)
    - cron: "0 10 * * 1-5"   # ~15:30 IST — backup for intraday_close (primary 15:15, the 3:15 square-off)
    - cron: "40 10 * * 1-5"  # ~16:10 IST — backup for preclose  (primary 15:40, post-3:30-close)

  # Manual trigger (pick a session from the UI dropdown).
  # Default is "test" — a fully SAFE dry run: it only rebuilds the dashboard from
  # existing data. It does NOT advance the trading day, does NOT trade, and does
  # NOT fetch fresh market data. Use it to verify everything works any time.
  #   test      -> safe dry run, zero side effects (default)
  #   preopen   -> refresh dashboard + macro sentiment, no trading
  #   morning/midday/afternoon/preclose -> real trading sessions (weekdays only)
  workflow_dispatch:
    inputs:
      session:
        description: "Session to run (test = safe dry run, no day/trade changes)"
        required: true
        default: "test"
        type: choice
        options: [test, preopen, morning, midday, afternoon, intraday_close, preclose]

  # PRIMARY trigger — cron-job.org (or any external pinger). Fires GitHub via API
  # for an EXACT session (no time-window guessing), punctually, because GitHub's
  # own cron is unreliable on timing. This is the normal trigger path. POST to
  #   /repos/<owner>/<repo>/dispatches  with
  #   {"event_type":"run-session","client_payload":{"session":"morning"}}
  # Configure cron-job.org with 6 FIXED daily times (Mon-Fri), one per session:
  #   preopen 08:35 · morning 09:35 · midday 11:45 · afternoon 13:15 ·
  #   intraday_close 15:15 · preclose 15:40 IST
  #   • intraday_close 15:15 squares off INTRADAY positions before the 15:30 close
  #     (exit anchored to the 3:15 price even if it fires a little late).
  #   • preclose 15:40 runs AFTER the 15:30 close to capture the full session +
  #     roll the trading day; it also backstops any intraday the 15:15 run missed.
  # Use 6 separate fixed-time jobs — NOT one "every 15 min" job (that fires ~15x
  # and, while each extra is a safe dedup no-op, it wastes Actions minutes).
  repository_dispatch:
    types: [run-session]

permissions:
  contents: write   # needed to commit brain + dashboard back to repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session from schedule
        id: session
        run: |
          # Session source:
          #   1) repository_dispatch (cron-job.org — the PUNCTUAL PRIMARY) -> exact
          #      session from client_payload, no time guessing. The normal path.
          #   2) workflow_dispatch (manual UI) -> the chosen dropdown input.
          #   3) schedule (GitHub cron — the BACKUP) -> WINDOW-based time mapping so
          #      a late/drifted backup fire still resolves to the right session.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "name=${{ github.event.client_payload.session }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Minutes since UTC midnight = robust single number to bucket on.
            # Force base-10: date emits zero-padded hours/mins (e.g. "08","09")
            # which bash would otherwise parse as INVALID octal -> "value too great
            # for base" error. 10# makes the arithmetic explicitly decimal.
            H=$(date -u +%H); MM=$(date -u +%M)
            MINS=$(( 10#$H * 60 + 10#$MM ))
            # GitHub-cron BACKUP fire times (UTC min): preopen 210 morning 270
            #   midday 430 afternoon 520 intraday_close 600 (15:30 IST) preclose 640
            #   (16:10 IST). Boundaries sit between consecutive backups. The last two
            #   are 40 min apart (close in time), so the boundary 620 tolerates ~18
            #   min of drift — fine, because the PRIMARY (repository_dispatch) always
            #   carries the exact session and bypasses these windows entirely.
            if   [ "$MINS" -lt 240 ];  then echo "name=preopen"        >> $GITHUB_OUTPUT   # < 04:00
            elif [ "$MINS" -lt 350 ];  then echo "name=morning"        >> $GITHUB_OUTPUT   # < 05:50
            elif [ "$MINS" -lt 475 ];  then echo "name=midday"         >> $GITHUB_OUTPUT   # < 07:55
            elif [ "$MINS" -lt 560 ];  then echo "name=afternoon"      >> $GITHUB_OUTPUT   # < 09:20
            elif [ "$MINS" -lt 620 ];  then echo "name=intraday_close" >> $GITHUB_OUTPUT   # < 10:20
            else                            echo "name=preclose"       >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          SESSION: ${{ steps.session.outputs.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m agent.main

      - name: Commit brain files and dashboard
        run: |
          git config user.name  "NSE AI Trader Bot"
          git config user.email "bot@nse-ai-trader.local"
          git add brain/ docs/ STRATEGY_REPORT.md README.md
          if ! git diff --cached --quiet; then
            SESSION="${{ steps.session.outputs.name }}"
            DATE=$(date +"%Y-%m-%d")
            git commit -m "[$DATE $SESSION] brain update + dashboard refresh"
            # Pull with rebase to absorb any code changes pushed while this run was executing
            # Retry up to 3 times in case of a simultaneous push race
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
          else
            echo "Nothing changed — skipping commit."
          fi
