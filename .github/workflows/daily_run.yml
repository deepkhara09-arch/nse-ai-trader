name: NSE AI Trader

on:
  # ── Triggering: cron-job.org (external, punctual) is the SOLE scheduler ──────
  # The GitHub-hosted `schedule:` cron was REMOVED: it fires late/unreliably AND
  # was double-firing alongside cron-job.org, producing duplicate runs in the log.
  # cron-job.org calls repository_dispatch (below) at exact IST times, on time,
  # once per session. (If you ever want a GitHub fallback again, re-add a
  # `schedule:` block — the per-day dedup guard makes overlaps harmless.)

  # Manual trigger (pick a session from the UI dropdown).
  # Default is "test" — a fully SAFE dry run: it only rebuilds the dashboard from
  # existing data. It does NOT advance the trading day, does NOT trade, and does
  # NOT fetch fresh market data. Use it to verify everything works any time.
  #   test      -> safe dry run, zero side effects (default)
  #   preopen   -> refresh dashboard + macro sentiment, no trading
  #   morning/midday/afternoon/preclose -> real trading sessions (weekdays only)
  workflow_dispatch:
    inputs:
      session:
        description: "Session to run (test = safe dry run, no day/trade changes)"
        required: true
        default: "test"
        type: choice
        options: [test, preopen, morning, midday, afternoon, preclose]

  # External punctual trigger (cron-job.org etc.) — fires GitHub on time via API.
  # POST to /repos/<owner>/<repo>/dispatches with:
  #   {"event_type":"run-session","client_payload":{"session":"morning"}}
  # This path runs the EXACT session in the payload, no time-window guessing.
  repository_dispatch:
    types: [run-session]

permissions:
  contents: write   # needed to commit brain + dashboard back to repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session from schedule
        id: session
        run: |
          # Session source:
          #   1) repository_dispatch (cron-job.org — the live trigger) -> exact
          #      session from client_payload. This is the normal path.
          #   2) workflow_dispatch (manual UI) -> the chosen dropdown input.
          #   3) else (only if a GitHub schedule: is ever re-added) -> WINDOW-based
          #      time mapping so a late fire still resolves to the right session.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "name=${{ github.event.client_payload.session }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Minutes since UTC midnight = robust single number to bucket on.
            # Force base-10: date emits zero-padded hours/mins (e.g. "08","09")
            # which bash would otherwise parse as INVALID octal -> "value too great
            # for base" error. 10# makes the arithmetic explicitly decimal.
            H=$(date -u +%H); MM=$(date -u +%M)
            MINS=$(( 10#$H * 60 + 10#$MM ))
            # Targets (UTC): preopen 03:00(180) morning 04:03(243)
            #                midday 06:13(373) afternoon 07:43(463) preclose 09:43(583)
            # Boundaries placed between targets so late fires still land right.
            if   [ "$MINS" -lt 210 ];  then echo "name=preopen"   >> $GITHUB_OUTPUT   # < 03:30
            elif [ "$MINS" -lt 330 ];  then echo "name=morning"   >> $GITHUB_OUTPUT   # < 05:30
            elif [ "$MINS" -lt 420 ];  then echo "name=midday"    >> $GITHUB_OUTPUT   # < 07:00
            elif [ "$MINS" -lt 520 ];  then echo "name=afternoon" >> $GITHUB_OUTPUT   # < 08:40
            else                            echo "name=preclose"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          SESSION: ${{ steps.session.outputs.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m agent.main

      - name: Commit brain files and dashboard
        run: |
          git config user.name  "NSE AI Trader Bot"
          git config user.email "bot@nse-ai-trader.local"
          git add brain/ docs/ STRATEGY_REPORT.md README.md
          if ! git diff --cached --quiet; then
            SESSION="${{ steps.session.outputs.name }}"
            DATE=$(date +"%Y-%m-%d")
            git commit -m "[$DATE $SESSION] brain update + dashboard refresh"
            # Pull with rebase to absorb any code changes pushed while this run was executing
            # Retry up to 3 times in case of a simultaneous push race
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
          else
            echo "Nothing changed — skipping commit."
          fi
