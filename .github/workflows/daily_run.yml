name: NSE AI Trader

on:
  # ── 5 runs per weekday (IST = UTC+5:30) ──────────────────────────────────
  # IMPORTANT: GitHub-hosted cron is BEST-EFFORT — it commonly fires 5–30 min
  # late under load (occasionally skips). We cannot force exact-time execution
  # on free Actions. Two mitigations:
  #   1) Schedule each run a few minutes EARLY so typical delay lands it near
  #      the intended IST time.
  #   2) Session detection below is WINDOW-based (a delayed run still maps to the
  #      right session instead of falling through to the wrong one).
  schedule:
    - cron: "0 3 * * 1-5"    # target ~08:35 IST — PRE-OPEN sentiment sweep (NEW)
    - cron: "3 4 * * 1-5"    # target ~09:35 IST — market open (morning)
    - cron: "13 6 * * 1-5"   # target ~11:45 IST — midday review (+ global sentiment)
    - cron: "43 7 * * 1-5"   # target ~13:15 IST — early afternoon (post-lunch)
    - cron: "43 9 * * 1-5"   # target ~15:15 IST — pre-close decisions

  # Manual trigger (pick a session from the UI dropdown).
  # Default is "test" — a fully SAFE dry run: it only rebuilds the dashboard from
  # existing data. It does NOT advance the trading day, does NOT trade, and does
  # NOT fetch fresh market data. Use it to verify everything works any time.
  #   test      -> safe dry run, zero side effects (default)
  #   preopen   -> refresh dashboard + macro sentiment, no trading
  #   morning/midday/afternoon/preclose -> real trading sessions (weekdays only)
  workflow_dispatch:
    inputs:
      session:
        description: "Session to run (test = safe dry run, no day/trade changes)"
        required: true
        default: "test"
        type: choice
        options: [test, preopen, morning, midday, afternoon, preclose]

permissions:
  contents: write   # needed to commit brain + dashboard back to repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session from schedule
        id: session
        run: |
          # If manually triggered, use the input; otherwise map the CURRENT UTC
          # time to a session WINDOW. Window-based mapping means a cron that fires
          # late still resolves to the correct session instead of the wrong one.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Minutes since UTC midnight = robust single number to bucket on.
            MINS=$(( $(date -u +%H) * 60 + $(date -u +%M) ))
            # Targets (UTC): preopen 03:00(180) morning 04:03(243)
            #                midday 06:13(373) afternoon 07:43(463) preclose 09:43(583)
            # Boundaries placed between targets so late fires still land right.
            if   [ "$MINS" -lt 210 ];  then echo "name=preopen"   >> $GITHUB_OUTPUT   # < 03:30
            elif [ "$MINS" -lt 330 ];  then echo "name=morning"   >> $GITHUB_OUTPUT   # < 05:30
            elif [ "$MINS" -lt 420 ];  then echo "name=midday"    >> $GITHUB_OUTPUT   # < 07:00
            elif [ "$MINS" -lt 520 ];  then echo "name=afternoon" >> $GITHUB_OUTPUT   # < 08:40
            else                            echo "name=preclose"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          SESSION: ${{ steps.session.outputs.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m agent.main

      - name: Commit brain files and dashboard
        run: |
          git config user.name  "NSE AI Trader Bot"
          git config user.email "bot@nse-ai-trader.local"
          git add brain/ docs/ STRATEGY_REPORT.md README.md
          if ! git diff --cached --quiet; then
            SESSION="${{ steps.session.outputs.name }}"
            DATE=$(date +"%Y-%m-%d")
            git commit -m "[$DATE $SESSION] brain update + dashboard refresh"
            # Pull with rebase to absorb any code changes pushed while this run was executing
            # Retry up to 3 times in case of a simultaneous push race
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
          else
            echo "Nothing changed — skipping commit."
          fi
