name: NSE AI Trader

on:
  # ── Triggering: two-layer for reliability, self-contained PRIMARY ────────────
  # PRIMARY: GitHub's own schedule: below. It fires EXACTLY 5 times per weekday —
  #   once per session — and needs no external service, so the tool runs on
  #   schedule even if nothing else is ever configured. (GitHub cron can drift a
  #   few minutes late, never early; the window-based session detection below maps
  #   a slightly-late fire to the correct session anyway.)
  # BACKUP: repository_dispatch (cron-job.org or any external pinger) can fire the
  #   exact session via client_payload. If the primary already ran that session
  #   today, the per-session dedup guard makes the backup a harmless dashboard-only
  #   no-op (no duplicate). If the primary somehow missed, the backup runs it for
  #   real. So: guaranteed on-schedule coverage with NO duplicate work — even if a
  #   misconfigured external pinger fires many times, every extra fire is a no-op.
  # NOTE: exactly 5 schedule entries = 5 runs/session. Do NOT add interval-style
  #   crons here, and keep any external pinger at 5 fixed times (not an interval),
  #   or you waste Actions minutes on redundant (still-safe) no-op runs.
  schedule:
    - cron: "3 3 * * 1-5"    # ~08:33 IST — pre-open  (target 08:35)
    - cron: "5 4 * * 1-5"    # ~09:35 IST — morning   (target 09:35)
    - cron: "15 6 * * 1-5"   # ~11:45 IST — midday    (target 11:45)
    - cron: "45 7 * * 1-5"   # ~13:15 IST — afternoon (target 13:15)
    - cron: "45 9 * * 1-5"   # ~15:15 IST — preclose  (target 15:15)

  # Manual trigger (pick a session from the UI dropdown).
  # Default is "test" — a fully SAFE dry run: it only rebuilds the dashboard from
  # existing data. It does NOT advance the trading day, does NOT trade, and does
  # NOT fetch fresh market data. Use it to verify everything works any time.
  #   test      -> safe dry run, zero side effects (default)
  #   preopen   -> refresh dashboard + macro sentiment, no trading
  #   morning/midday/afternoon/preclose -> real trading sessions (weekdays only)
  workflow_dispatch:
    inputs:
      session:
        description: "Session to run (test = safe dry run, no day/trade changes)"
        required: true
        default: "test"
        type: choice
        options: [test, preopen, morning, midday, afternoon, preclose]

  # BACKUP trigger (optional external pinger such as cron-job.org) — fires GitHub
  # via API for an EXACT session, no time-window guessing. The GitHub schedule:
  # above is the primary; this is only a safety net. The per-session dedup guard
  # makes it a harmless no-op if the primary already ran. POST to
  #   /repos/<owner>/<repo>/dispatches  with
  #   {"event_type":"run-session","client_payload":{"session":"morning"}}
  # IMPORTANT: if you use an external pinger, schedule it at the 5 FIXED session
  # times (08:35/09:35/11:45/13:15/15:15 IST) — NOT an interval like "every 15
  # min", which is what caused redundant (still-safe) runs before.
  repository_dispatch:
    types: [run-session]

permissions:
  contents: write   # needed to commit brain + dashboard back to repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session from schedule
        id: session
        run: |
          # Session source:
          #   1) repository_dispatch (external pinger / backup) -> exact session
          #      from client_payload — no time guessing.
          #   2) workflow_dispatch (manual UI) -> the chosen dropdown input.
          #   3) schedule (GitHub cron — the PRIMARY) -> WINDOW-based time mapping
          #      so a slightly-late fire still resolves to the right session.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "name=${{ github.event.client_payload.session }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Minutes since UTC midnight = robust single number to bucket on.
            # Force base-10: date emits zero-padded hours/mins (e.g. "08","09")
            # which bash would otherwise parse as INVALID octal -> "value too great
            # for base" error. 10# makes the arithmetic explicitly decimal.
            H=$(date -u +%H); MM=$(date -u +%M)
            MINS=$(( 10#$H * 60 + 10#$MM ))
            # GitHub-cron fire times (UTC min): preopen 183 morning 245 midday 375
            #                                   afternoon 465 preclose 585
            # Boundaries are the MIDPOINTS between consecutive sessions, so even a
            # large cron drift (gaps are 60-130 min) still lands on the right one.
            if   [ "$MINS" -lt 214 ];  then echo "name=preopen"   >> $GITHUB_OUTPUT   # < 03:34
            elif [ "$MINS" -lt 310 ];  then echo "name=morning"   >> $GITHUB_OUTPUT   # < 05:10
            elif [ "$MINS" -lt 420 ];  then echo "name=midday"    >> $GITHUB_OUTPUT   # < 07:00
            elif [ "$MINS" -lt 525 ];  then echo "name=afternoon" >> $GITHUB_OUTPUT   # < 08:45
            else                            echo "name=preclose"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          SESSION: ${{ steps.session.outputs.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m agent.main

      - name: Commit brain files and dashboard
        run: |
          git config user.name  "NSE AI Trader Bot"
          git config user.email "bot@nse-ai-trader.local"
          git add brain/ docs/ STRATEGY_REPORT.md README.md
          if ! git diff --cached --quiet; then
            SESSION="${{ steps.session.outputs.name }}"
            DATE=$(date +"%Y-%m-%d")
            git commit -m "[$DATE $SESSION] brain update + dashboard refresh"
            # Pull with rebase to absorb any code changes pushed while this run was executing
            # Retry up to 3 times in case of a simultaneous push race
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
          else
            echo "Nothing changed — skipping commit."
          fi
