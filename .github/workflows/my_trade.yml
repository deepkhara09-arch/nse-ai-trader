name: My Trades

# Log YOUR real trades so the tool manages them for you.
# GitHub renders these inputs as a simple form:
#   repo → Actions → "My Trades" → Run workflow →
#     action: bought or sold
#     ticker: e.g. BAJFINANCE   (with or without .NS)
#     price:  your actual fill price, e.g. 1015.50
#     qty:    number of shares (ignored for 'sold')
# After it runs, the dashboard's "My Positions" panel shows your position with a
# personalized stop/target (anchored to YOUR fill), trails the stop every
# session, and flags EXIT NOW when your stop/target is hit. The tool never
# auto-closes your trade — you confirm by logging 'sold' here.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Did you buy or sell?"
        required: true
        type: choice
        options: [bought, sold]
      ticker:
        description: "Stock symbol (e.g. BAJFINANCE)"
        required: true
        type: string
      price:
        description: "Your actual fill price (e.g. 1015.50)"
        required: true
        type: string
      qty:
        description: "Quantity — shares bought, or shares to sell (blank = sell all)"
        required: false
        default: "1"
        type: string

  # Direct submit from the dashboard: it POSTs a repository_dispatch with the
  # same fields, so you never have to fill this form by hand.
  repository_dispatch:
    types: [my-trade]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record the trade
        # Fields come from the manual form OR the dashboard's direct submit
        # (repository_dispatch client_payload) — whichever triggered this run.
        env:
          MT_ACTION: ${{ github.event.inputs.action || github.event.client_payload.action }}
          MT_TICKER: ${{ github.event.inputs.ticker || github.event.client_payload.ticker }}
          MT_PRICE:  ${{ github.event.inputs.price  || github.event.client_payload.price }}
          MT_QTY:    ${{ github.event.inputs.qty    || github.event.client_payload.qty }}
        run: |
          python -m agent.my_trades "$MT_ACTION" "$MT_TICKER" "$MT_PRICE" "$MT_QTY"

      - name: Rebuild dashboard so the panel shows immediately
        env:
          SESSION: test
        run: python -m agent.main

      - name: Commit
        run: |
          git config user.name  "NSE AI Trader Bot"
          git config user.email "bot@nse-ai-trader.local"
          git add brain/ docs/
          if ! git diff --cached --quiet; then
            git commit -m "[my-trades] ${{ github.event.inputs.action || github.event.client_payload.action }} ${{ github.event.inputs.ticker || github.event.client_payload.ticker }} @ ${{ github.event.inputs.price || github.event.client_payload.price }}"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
          else
            echo "Nothing changed."
          fi
